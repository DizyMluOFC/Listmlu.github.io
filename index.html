<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TONTONAN — Film & Drakor Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --white: #f5f5f0;
    --gray-1: #1a1a1a;
    --gray-2: #2a2a2a;
    --gray-3: #555;
    --gray-4: #888;
    --gray-5: #bbb;
    --gray-6: #ddd;
    --accent: #f5f5f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* NOISE TEXTURE */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.5;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--gray-2);
    padding: 0 2rem;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .logo span {
    font-weight: 400;
    font-style: italic;
    color: var(--gray-4);
    font-size: 0.75rem;
    display: block;
    letter-spacing: 0.3em;
    margin-top: -4px;
  }

  .header-actions {
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }

  .stats-bar {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--gray-4);
    display: flex;
    gap: 1.5rem;
  }

  .stat { display: flex; flex-direction: column; align-items: center; }
  .stat-num { color: var(--white); font-size: 1rem; font-weight: 500; }

  /* MAIN LAYOUT */
  .app {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
  }

  /* SEARCH SECTION */
  .search-section {
    margin-bottom: 3rem;
    animation: fadeUp 0.6s ease both;
  }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gray-4);
    margin-bottom: 1rem;
  }

  .search-wrapper {
    display: flex;
    gap: 0.75rem;
    align-items: stretch;
  }

  .search-input-wrap {
    flex: 1;
    position: relative;
  }

  .search-input {
    width: 100%;
    background: var(--gray-1);
    border: 1px solid var(--gray-2);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    padding: 0.85rem 1rem 0.85rem 3rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--gray-5); }
  .search-input::placeholder { color: var(--gray-3); }

  .search-icon {
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gray-3);
    font-size: 1rem;
  }

  .type-toggle {
    display: flex;
    border: 1px solid var(--gray-2);
    overflow: hidden;
  }

  .type-btn {
    background: transparent;
    border: none;
    color: var(--gray-4);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 0 1.25rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .type-btn.active {
    background: var(--white);
    color: var(--black);
  }

  .btn-primary {
    background: var(--white);
    color: var(--black);
    border: none;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 0 1.5rem;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-primary:hover { background: var(--gray-5); }
  .btn-primary:active { transform: scale(0.98); }

  /* SEARCH RESULTS DROPDOWN */
  .search-results {
    position: relative;
    margin-top: 0.5rem;
  }

  .results-list {
    background: var(--gray-1);
    border: 1px solid var(--gray-2);
    display: none;
    max-height: 420px;
    overflow-y: auto;
  }

  .results-list.open { display: block; }

  .result-item {
    display: flex;
    gap: 1rem;
    padding: 0.85rem 1rem;
    border-bottom: 1px solid var(--gray-2);
    cursor: pointer;
    transition: background 0.15s;
    align-items: center;
  }

  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: var(--gray-2); }

  .result-poster {
    width: 36px;
    height: 54px;
    object-fit: cover;
    background: var(--gray-2);
    flex-shrink: 0;
  }

  .result-poster-placeholder {
    width: 36px;
    height: 54px;
    background: var(--gray-2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-4);
    font-size: 1rem;
    flex-shrink: 0;
  }

  .result-info { flex: 1; min-width: 0; }

  .result-title {
    font-size: 0.9rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .result-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--gray-4);
    margin-top: 0.25rem;
  }

  .result-rating {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: var(--gray-5);
    display: flex;
    align-items: center;
    gap: 0.25rem;
    flex-shrink: 0;
  }

  .result-add-btn {
    background: transparent;
    border: 1px solid var(--gray-3);
    color: var(--gray-4);
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    padding: 0.3rem 0.7rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .result-add-btn:hover { border-color: var(--white); color: var(--white); }

  /* FILTERS */
  .filters {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    animation: fadeUp 0.6s 0.1s ease both;
  }

  .filter-btn {
    background: transparent;
    border: 1px solid var(--gray-2);
    color: var(--gray-4);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    padding: 0.45rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .filter-btn.active {
    background: var(--white);
    color: var(--black);
    border-color: var(--white);
  }

  .filter-btn:hover:not(.active) { border-color: var(--gray-4); color: var(--gray-5); }

  /* WATCHLIST GRID */
  .list-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .list-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.75rem;
    font-weight: 700;
  }

  .sort-select {
    background: transparent;
    border: 1px solid var(--gray-2);
    color: var(--gray-4);
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    padding: 0.4rem 0.75rem;
    cursor: pointer;
    outline: none;
    letter-spacing: 0.1em;
  }

  .sort-select option { background: var(--gray-1); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1.5rem;
    animation: fadeUp 0.6s 0.3s ease both;
  }

  /* CARD */
  .card {
    position: relative;
    cursor: pointer;
    group: true;
  }

  .card-poster-wrap {
    position: relative;
    overflow: hidden;
    aspect-ratio: 2/3;
    background: var(--gray-1);
    border: 1px solid var(--gray-2);
  }

  .card-poster {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease, filter 0.4s ease;
    filter: grayscale(20%);
  }

  .card:hover .card-poster {
    transform: scale(1.05);
    filter: grayscale(0%);
  }

  .card-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.3) 50%, transparent 100%);
    opacity: 0;
    transition: opacity 0.3s;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 1rem;
  }

  .card:hover .card-overlay { opacity: 1; }

  .card-actions {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .card-action-btn {
    background: rgba(245,245,240,0.1);
    backdrop-filter: blur(4px);
    border: 1px solid rgba(245,245,240,0.2);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    padding: 0.3rem 0.6rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.2s;
  }

  .card-action-btn:hover { background: rgba(245,245,240,0.25); }
  .card-action-btn.delete { border-color: rgba(255,80,80,0.4); }
  .card-action-btn.delete:hover { background: rgba(255,80,80,0.2); }

  .card-status-badge {
    position: absolute;
    top: 0.6rem;
    left: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    padding: 0.25rem 0.5rem;
    text-transform: uppercase;
    font-weight: 500;
    z-index: 2;
  }

  .badge-watched { background: var(--white); color: var(--black); }
  .badge-watching { background: var(--gray-3); color: var(--white); }
  .badge-wishlist { background: transparent; border: 1px solid var(--gray-4); color: var(--gray-4); }

  .card-type-badge {
    position: absolute;
    top: 0.6rem;
    right: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.1em;
    padding: 0.2rem 0.4rem;
    border: 1px solid var(--gray-3);
    color: var(--gray-4);
    z-index: 2;
    background: rgba(10,10,10,0.7);
    backdrop-filter: blur(4px);
  }

  .card-rating-badge {
    position: absolute;
    bottom: 0.6rem;
    right: 0.6rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--gray-5);
    background: rgba(10,10,10,0.8);
    padding: 0.2rem 0.4rem;
    z-index: 2;
  }

  .card-poster-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--gray-1);
    color: var(--gray-3);
    font-size: 2.5rem;
    gap: 0.5rem;
  }

  .card-poster-placeholder span {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    color: var(--gray-4);
    letter-spacing: 0.1em;
  }

  .card-info { padding: 0.75rem 0 0; }

  .card-title {
    font-size: 0.85rem;
    font-weight: 500;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-year {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--gray-4);
    margin-top: 0.3rem;
  }

  .card-my-rating {
    margin-top: 0.4rem;
    display: flex;
    gap: 2px;
  }

  .star {
    font-size: 0.7rem;
    cursor: pointer;
    color: var(--gray-3);
    transition: color 0.1s;
  }

  .star.filled { color: var(--white); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 6rem 2rem;
    animation: fadeUp 0.6s ease both;
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 1.5rem;
    opacity: 0.3;
  }

  .empty-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--gray-5);
    margin-bottom: 0.5rem;
  }

  .empty-sub {
    font-size: 0.85rem;
    color: var(--gray-4);
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    backdrop-filter: blur(8px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--gray-1);
    border: 1px solid var(--gray-2);
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(20px);
    transition: transform 0.3s;
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--gray-2);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.25rem;
  }

  .modal-close {
    background: transparent;
    border: none;
    color: var(--gray-4);
    font-size: 1.2rem;
    cursor: pointer;
    transition: color 0.2s;
    padding: 0;
    line-height: 1;
  }

  .modal-close:hover { color: var(--white); }

  .modal-body { padding: 1.5rem; }

  .modal-poster-row {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .modal-poster {
    width: 90px;
    height: 135px;
    object-fit: cover;
    border: 1px solid var(--gray-2);
    flex-shrink: 0;
  }

  .modal-movie-info { flex: 1; }

  .modal-movie-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
  }

  .modal-movie-meta {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    color: var(--gray-4);
    line-height: 1.8;
  }

  .modal-movie-overview {
    font-size: 0.8rem;
    color: var(--gray-5);
    line-height: 1.6;
    margin-top: 0.75rem;
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .form-group { margin-bottom: 1.25rem; }

  .form-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gray-4);
    display: block;
    margin-bottom: 0.5rem;
  }

  .form-select, .form-textarea, .form-input {
    width: 100%;
    background: var(--gray-2);
    border: 1px solid var(--gray-2);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-select:focus, .form-textarea:focus, .form-input:focus {
    border-color: var(--gray-5);
  }

  .form-select option { background: var(--gray-1); }

  .form-textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.5;
  }

  .star-rating-input {
    display: flex;
    gap: 4px;
  }

  .star-input {
    font-size: 1.5rem;
    cursor: pointer;
    color: var(--gray-3);
    transition: color 0.1s;
    background: none;
    border: none;
    padding: 0;
  }

  .star-input.filled, .star-input:hover { color: var(--white); }

  .modal-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--gray-2);
    display: flex;
    gap: 0.75rem;
    justify-content: flex-end;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--gray-2);
    color: var(--gray-4);
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    padding: 0.6rem 1.25rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-ghost:hover { border-color: var(--gray-4); color: var(--gray-5); }

  /* TOAST */
  .toast-container {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    z-index: 300;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .toast {
    background: var(--white);
    color: var(--black);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 0.75rem 1.25rem;
    letter-spacing: 0.05em;
    animation: slideIn 0.3s ease, fadeOut 0.3s 2.7s ease forwards;
    border-left: 3px solid var(--black);
  }

  .toast.error {
    background: var(--black);
    color: var(--white);
    border-left: 3px solid #ff5050;
  }

  /* LOADING */
  .loader {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid var(--gray-3);
    border-top-color: var(--white);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    vertical-align: middle;
  }

  /* PROGRESS BAR */
  .progress-section {
    margin-bottom: 2rem;
    animation: fadeUp 0.6s 0.15s ease both;
  }

  .progress-track {
    background: var(--gray-2);
    height: 2px;
    position: relative;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--white);
    transition: width 0.5s ease;
  }

  .progress-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    color: var(--gray-4);
  }

  /* VIEW DETAIL MODAL */
  .detail-genres {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    margin-top: 0.5rem;
  }

  .genre-tag {
    font-family: 'DM Mono', monospace;
    font-size: 0.55rem;
    padding: 0.2rem 0.5rem;
    border: 1px solid var(--gray-3);
    color: var(--gray-4);
    letter-spacing: 0.05em;
  }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideIn {
    from { transform: translateX(100%); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to { opacity: 0; pointer-events: none; }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--gray-1); }
  ::-webkit-scrollbar-thumb { background: var(--gray-3); }

  /* RESPONSIVE */
  @media (max-width: 640px) {
    .app { padding: 1.25rem; }
    .stats-bar { display: none; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
    .search-wrapper { flex-direction: column; }
    .type-toggle { width: 100%; }
    .type-btn { flex: 1; padding: 0.7rem; }
    .btn-primary { padding: 0.7rem 1rem; }
  }

  .divider {
    border: none;
    border-top: 1px solid var(--gray-2);
    margin: 2.5rem 0;
  }

  .no-results {
    text-align: center;
    padding: 2rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    color: var(--gray-4);
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    Tontonan
    <span>Film & Drakor Tracker</span>
  </div>
  <div class="header-actions">
    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <span class="stat-num" id="statTotal">0</span>
        <span>TOTAL</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="statWatched">0</span>
        <span>SELESAI</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="statWatching">0</span>
        <span>NONTON</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="statWishlist">0</span>
        <span>MAUNONTON</span>
      </div>
    </div>
  </div>
</header>

<!-- APP -->
<div class="app">

  <!-- SEARCH -->
  <div class="search-section">
    <div class="section-label">// Cari Film atau Drama</div>
    <div class="search-wrapper">
      <div class="search-input-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" class="search-input" id="searchInput" placeholder="Ketik judul film atau drama Korea..." autocomplete="off">
        <div class="search-results">
          <div class="results-list" id="resultsList"></div>
        </div>
      </div>
      <div class="type-toggle">
        <button class="type-btn active" data-type="movie" onclick="setType('movie', this)">Film</button>
        <button class="type-btn" data-type="tv" onclick="setType('tv', this)">Drakor/Series</button>
      </div>
      <button class="btn-primary" onclick="triggerSearch()">Cari</button>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-section" id="progressSection" style="display:none">
    <div class="section-label">// Progress Tontonan</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="progress-labels">
      <span id="progressLabel">0 dari 0 selesai ditonton</span>
      <span id="progressPct">0%</span>
    </div>
  </div>

  <!-- FILTERS + SORT -->
  <div class="filters" id="filtersRow">
    <button class="filter-btn active" onclick="setFilter('all', this)">Semua</button>
    <button class="filter-btn" onclick="setFilter('watched', this)">✓ Selesai</button>
    <button class="filter-btn" onclick="setFilter('watching', this)">▶ Sedang Nonton</button>
    <button class="filter-btn" onclick="setFilter('wishlist', this)">♡ Mau Nonton</button>
    <button class="filter-btn" onclick="setFilter('movie', this)">Film</button>
    <button class="filter-btn" onclick="setFilter('tv', this)">Series/Drakor</button>
  </div>

  <!-- LIST HEADER -->
  <div class="list-header">
    <h2 class="list-title" id="listTitle">Daftar Tontonan</h2>
    <select class="sort-select" id="sortSelect" onchange="renderList()">
      <option value="newest">Terbaru Ditambah</option>
      <option value="title">Judul A–Z</option>
      <option value="rating_high">Rating Tertinggi</option>
      <option value="year_new">Tahun Terbaru</option>
    </select>
  </div>

  <!-- GRID -->
  <div class="grid" id="watchGrid"></div>
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="empty-icon">🎬</div>
    <div class="empty-title">Belum Ada Tontonan</div>
    <div class="empty-sub">Cari film atau drakor di atas, lalu tambahkan ke daftar kamu.</div>
  </div>

</div>

<!-- ADD MODAL -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Tambah ke Daftar</div>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-poster-row" id="addPosterRow"></div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="addStatus">
          <option value="wishlist">♡ Mau Nonton</option>
          <option value="watching">▶ Sedang Nonton</option>
          <option value="watched">✓ Sudah Selesai</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Rating Kamu (1–5 ⭐)</label>
        <div class="star-rating-input" id="addStarRating">
          <button class="star-input" data-val="1" onclick="setStarRating(1)">★</button>
          <button class="star-input" data-val="2" onclick="setStarRating(2)">★</button>
          <button class="star-input" data-val="3" onclick="setStarRating(3)">★</button>
          <button class="star-input" data-val="4" onclick="setStarRating(4)">★</button>
          <button class="star-input" data-val="5" onclick="setStarRating(5)">★</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Catatan</label>
        <textarea class="form-textarea" id="addNotes" placeholder="Tulis catatan, kesan, atau komentar..."></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('addModal')">Batal</button>
      <button class="btn-primary" onclick="confirmAdd()" style="padding:0.6rem 1.5rem">Simpan</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Detail</div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body" id="detailBody"></div>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeModal('detailModal')">Tutup</button>
      <button class="btn-primary" onclick="openEditFromDetail()" style="padding:0.6rem 1.5rem">Edit</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script>
// ========== CONFIG ==========
const TMDB_KEY = '3d1e25f0e4f0d376884afddb62297ff1'; // Public demo key
const TMDB_IMG = 'https://image.tmdb.org/t/p/w342';
const TMDB_IMG_SM = 'https://image.tmdb.org/t/p/w92';
const LS_KEY = 'tontonan_v2';

// ========== STATE ==========
let watchlist = JSON.parse(localStorage.getItem(LS_KEY) || '[]');
let currentFilter = 'all';
let currentType = 'movie';
let pendingItem = null;
let currentStarRating = 0;
let currentDetailId = null;
let searchTimer = null;

// ========== SAVE ==========
function save() {
  localStorage.setItem(LS_KEY, JSON.stringify(watchlist));
  updateStats();
  renderList();
}

// ========== STATS ==========
function updateStats() {
  const total = watchlist.length;
  const watched = watchlist.filter(x => x.status === 'watched').length;
  const watching = watchlist.filter(x => x.status === 'watching').length;
  const wish = watchlist.filter(x => x.status === 'wishlist').length;

  document.getElementById('statTotal').textContent = total;
  document.getElementById('statWatched').textContent = watched;
  document.getElementById('statWatching').textContent = watching;
  document.getElementById('statWishlist').textContent = wish;

  const ps = document.getElementById('progressSection');
  if (total > 0) {
    ps.style.display = 'block';
    const pct = Math.round((watched / total) * 100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${watched} dari ${total} selesai ditonton`;
    document.getElementById('progressPct').textContent = pct + '%';
  } else {
    ps.style.display = 'none';
  }
}

// ========== TYPE ==========
function setType(type, el) {
  currentType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('resultsList').classList.remove('open');
  document.getElementById('searchInput').value = '';
}

// ========== FILTER ==========
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ========== SEARCH ==========
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (q.length < 2) {
    document.getElementById('resultsList').classList.remove('open');
    return;
  }
  searchTimer = setTimeout(() => fetchSearch(q), 400);
});

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') triggerSearch();
});

document.addEventListener('click', e => {
  if (!e.target.closest('.search-input-wrap')) {
    document.getElementById('resultsList').classList.remove('open');
  }
});

function triggerSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (q.length >= 2) fetchSearch(q);
}

async function fetchSearch(q) {
  const list = document.getElementById('resultsList');
  list.innerHTML = '<div class="no-results"><span class="loader"></span> Mencari...</div>';
  list.classList.add('open');

  try {
    const res = await fetch(`https://api.themoviedb.org/3/search/${currentType}?api_key=${TMDB_KEY}&query=${encodeURIComponent(q)}&include_adult=false&language=id-ID`);
    const data = await res.json();

    if (!data.results || data.results.length === 0) {
      list.innerHTML = '<div class="no-results">Tidak ditemukan. Coba judul lain.</div>';
      return;
    }

    list.innerHTML = data.results.slice(0, 8).map(item => {
      const title = item.title || item.name || '-';
      const year = (item.release_date || item.first_air_date || '').slice(0, 4);
      const rating = item.vote_average ? item.vote_average.toFixed(1) : '-';
      const posterSrc = item.poster_path ? TMDB_IMG_SM + item.poster_path : null;
      const alreadyIn = watchlist.find(w => w.id === item.id);
      return `
        <div class="result-item">
          ${posterSrc
            ? `<img class="result-poster" src="${posterSrc}" alt="" onerror="this.style.display='none'">`
            : `<div class="result-poster-placeholder">🎬</div>`}
          <div class="result-info">
            <div class="result-title">${title}</div>
            <div class="result-meta">${year} · ${currentType === 'tv' ? 'SERIES' : 'FILM'}</div>
          </div>
          <div class="result-rating">⭐ ${rating}</div>
          ${alreadyIn
            ? `<button class="result-add-btn" disabled style="opacity:0.4">Ditambah</button>`
            : `<button class="result-add-btn" onclick='openAddModal(${JSON.stringify({...item, _mediaType: currentType})})'>+ Tambah</button>`}
        </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '<div class="no-results">Gagal memuat. Cek koneksi internet.</div>';
  }
}

// ========== ADD MODAL ==========
function openAddModal(item) {
  pendingItem = item;
  currentStarRating = 0;

  const title = item.title || item.name || '-';
  const year = (item.release_date || item.first_air_date || '').slice(0, 4);
  const overview = item.overview || '';
  const posterSrc = item.poster_path ? TMDB_IMG + item.poster_path : null;
  const rating = item.vote_average ? item.vote_average.toFixed(1) : '-';
  const mediaType = item._mediaType || 'movie';

  document.getElementById('addPosterRow').innerHTML = `
    ${posterSrc
      ? `<img class="modal-poster" src="${posterSrc}" alt="">`
      : `<div class="modal-poster" style="background:var(--gray-2);display:flex;align-items:center;justify-content:center;font-size:2rem;">🎬</div>`}
    <div class="modal-movie-info">
      <div class="modal-movie-title">${title}</div>
      <div class="modal-movie-meta">
        ${year}<br>
        ${mediaType === 'tv' ? 'SERIES / DRAKOR' : 'FILM'}<br>
        TMDB: ⭐ ${rating}
      </div>
      ${overview ? `<div class="modal-movie-overview">${overview}</div>` : ''}
    </div>`;

  document.getElementById('addStatus').value = 'wishlist';
  document.getElementById('addNotes').value = '';
  updateStars(0);
  openModal('addModal');
  document.getElementById('resultsList').classList.remove('open');
}

function setStarRating(val) {
  currentStarRating = val;
  updateStars(val);
}

function updateStars(val) {
  document.querySelectorAll('#addStarRating .star-input').forEach(s => {
    s.classList.toggle('filled', parseInt(s.dataset.val) <= val);
  });
}

function confirmAdd() {
  if (!pendingItem) return;
  const item = pendingItem;
  const exists = watchlist.find(w => w.id === item.id);
  if (exists) { showToast('Sudah ada di daftar!'); closeModal('addModal'); return; }

  const entry = {
    id: item.id,
    title: item.title || item.name || '-',
    year: (item.release_date || item.first_air_date || '').slice(0, 4),
    poster: item.poster_path || null,
    overview: item.overview || '',
    tmdbRating: item.vote_average || 0,
    mediaType: item._mediaType || 'movie',
    genres: item.genre_ids || [],
    status: document.getElementById('addStatus').value,
    myRating: currentStarRating,
    notes: document.getElementById('addNotes').value.trim(),
    addedAt: Date.now(),
  };

  watchlist.unshift(entry);
  save();
  showToast(`"${entry.title}" ditambahkan!`);
  closeModal('addModal');
  pendingItem = null;
}

// ========== EDIT ==========
function openEdit(id) {
  const item = watchlist.find(w => w.id === id);
  if (!item) return;
  currentDetailId = id;
  currentStarRating = item.myRating || 0;
  pendingItem = { ...item, _edit: true };

  const posterSrc = item.poster ? TMDB_IMG + item.poster : null;
  document.getElementById('addPosterRow').innerHTML = `
    ${posterSrc
      ? `<img class="modal-poster" src="${posterSrc}" alt="">`
      : `<div class="modal-poster" style="background:var(--gray-2);display:flex;align-items:center;justify-content:center;font-size:2rem;">🎬</div>`}
    <div class="modal-movie-info">
      <div class="modal-movie-title">${item.title}</div>
      <div class="modal-movie-meta">${item.year} · ${item.mediaType === 'tv' ? 'SERIES' : 'FILM'}</div>
      ${item.overview ? `<div class="modal-movie-overview">${item.overview}</div>` : ''}
    </div>`;

  document.getElementById('addStatus').value = item.status;
  document.getElementById('addNotes').value = item.notes || '';
  updateStars(currentStarRating);
  openModal('addModal');
}

function confirmAdd() {
  if (!pendingItem) return;

  if (pendingItem._edit) {
    // UPDATE mode
    const idx = watchlist.findIndex(w => w.id === pendingItem.id);
    if (idx !== -1) {
      watchlist[idx].status = document.getElementById('addStatus').value;
      watchlist[idx].myRating = currentStarRating;
      watchlist[idx].notes = document.getElementById('addNotes').value.trim();
    }
    save();
    showToast('Diperbarui!');
    closeModal('addModal');
    pendingItem = null;
    return;
  }

  const item = pendingItem;
  const exists = watchlist.find(w => w.id === item.id);
  if (exists) { showToast('Sudah ada di daftar!'); closeModal('addModal'); return; }

  const entry = {
    id: item.id,
    title: item.title || item.name || '-',
    year: (item.release_date || item.first_air_date || '').slice(0, 4),
    poster: item.poster_path || null,
    overview: item.overview || '',
    tmdbRating: item.vote_average || 0,
    mediaType: item._mediaType || 'movie',
    genres: item.genre_ids || [],
    status: document.getElementById('addStatus').value,
    myRating: currentStarRating,
    notes: document.getElementById('addNotes').value.trim(),
    addedAt: Date.now(),
  };

  watchlist.unshift(entry);
  save();
  showToast(`"${entry.title}" ditambahkan!`);
  closeModal('addModal');
  pendingItem = null;
}

function deleteItem(id) {
  const item = watchlist.find(w => w.id === id);
  if (!item) return;
  if (!confirm(`Hapus "${item.title}" dari daftar?`)) return;
  watchlist = watchlist.filter(w => w.id !== id);
  save();
  showToast('Dihapus dari daftar.');
}

function toggleStatus(id) {
  const item = watchlist.find(w => w.id === id);
  if (!item) return;
  const cycle = { wishlist: 'watching', watching: 'watched', watched: 'wishlist' };
  item.status = cycle[item.status] || 'wishlist';
  save();
}

// ========== DETAIL ==========
function openDetail(id) {
  const item = watchlist.find(w => w.id === id);
  if (!item) return;
  currentDetailId = id;

  const posterSrc = item.poster ? TMDB_IMG + item.poster : null;
  const statusLabel = { watched: '✓ Selesai', watching: '▶ Sedang Nonton', wishlist: '♡ Mau Nonton' };
  const stars = '★'.repeat(item.myRating || 0) + '☆'.repeat(5 - (item.myRating || 0));

  document.getElementById('detailBody').innerHTML = `
    <div class="modal-poster-row">
      ${posterSrc
        ? `<img class="modal-poster" src="${posterSrc}" alt="" style="width:110px;height:165px">`
        : `<div class="modal-poster" style="background:var(--gray-2);display:flex;align-items:center;justify-content:center;font-size:2rem;width:110px;height:165px">🎬</div>`}
      <div class="modal-movie-info">
        <div class="modal-movie-title">${item.title}</div>
        <div class="modal-movie-meta">
          ${item.year}<br>
          ${item.mediaType === 'tv' ? 'SERIES / DRAKOR' : 'FILM'}<br>
          TMDB: ⭐ ${item.tmdbRating ? item.tmdbRating.toFixed(1) : '-'}<br>
          Status: ${statusLabel[item.status] || '-'}<br>
          Rating Kamu: <span style="color:var(--white)">${stars}</span>
        </div>
        ${item.overview ? `<div class="modal-movie-overview">${item.overview}</div>` : ''}
      </div>
    </div>
    ${item.notes ? `
      <div class="form-group">
        <div class="form-label">Catatan Kamu</div>
        <div style="background:var(--gray-2);padding:0.75rem;font-size:0.82rem;line-height:1.6;color:var(--gray-5)">${item.notes}</div>
      </div>` : ''}
    <div style="font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--gray-4);margin-top:0.5rem">
      Ditambah: ${new Date(item.addedAt).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'})}
    </div>`;

  openModal('detailModal');
}

function openEditFromDetail() {
  closeModal('detailModal');
  setTimeout(() => openEdit(currentDetailId), 200);
}

// ========== RENDER ==========
function renderList() {
  const sort = document.getElementById('sortSelect').value;
  let items = [...watchlist];

  if (currentFilter === 'watched') items = items.filter(x => x.status === 'watched');
  else if (currentFilter === 'watching') items = items.filter(x => x.status === 'watching');
  else if (currentFilter === 'wishlist') items = items.filter(x => x.status === 'wishlist');
  else if (currentFilter === 'movie') items = items.filter(x => x.mediaType === 'movie');
  else if (currentFilter === 'tv') items = items.filter(x => x.mediaType === 'tv');

  if (sort === 'title') items.sort((a, b) => a.title.localeCompare(b.title));
  else if (sort === 'rating_high') items.sort((a, b) => (b.myRating || 0) - (a.myRating || 0));
  else if (sort === 'year_new') items.sort((a, b) => (b.year || '0').localeCompare(a.year || '0'));
  else items.sort((a, b) => b.addedAt - a.addedAt);

  const filterLabels = {
    all: 'Semua Tontonan', watched: 'Sudah Selesai',
    watching: 'Sedang Ditonton', wishlist: 'Mau Ditonton',
    movie: 'Film', tv: 'Series / Drakor'
  };
  document.getElementById('listTitle').textContent = `${filterLabels[currentFilter] || 'Semua'} (${items.length})`;

  const grid = document.getElementById('watchGrid');
  const empty = document.getElementById('emptyState');

  if (items.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const statusBadge = { watched: 'badge-watched', watching: 'badge-watching', wishlist: 'badge-wishlist' };
  const statusText = { watched: 'Selesai', watching: 'Nonton', wishlist: 'Mau' };

  grid.innerHTML = items.map(item => {
    const posterSrc = item.poster ? TMDB_IMG + item.poster : null;
    const stars = Array.from({length: 5}, (_, i) =>
      `<span class="star${i < (item.myRating || 0) ? ' filled' : ''}">★</span>`).join('');
    return `
      <div class="card" onclick="openDetail(${item.id})">
        <div class="card-poster-wrap">
          <span class="card-status-badge ${statusBadge[item.status] || ''}">${statusText[item.status] || ''}</span>
          <span class="card-type-badge">${item.mediaType === 'tv' ? 'SERIES' : 'FILM'}</span>
          ${item.tmdbRating ? `<span class="card-rating-badge">⭐ ${item.tmdbRating.toFixed(1)}</span>` : ''}
          ${posterSrc
            ? `<img class="card-poster" src="${posterSrc}" alt="${item.title}" loading="lazy">`
            : `<div class="card-poster-placeholder">🎬<span>${item.mediaType === 'tv' ? 'SERIES' : 'FILM'}</span></div>`}
          <div class="card-overlay">
            <div class="card-actions">
              <button class="card-action-btn" onclick="event.stopPropagation();toggleStatus(${item.id})">⟳ Status</button>
              <button class="card-action-btn" onclick="event.stopPropagation();openEdit(${item.id})">✎ Edit</button>
              <button class="card-action-btn delete" onclick="event.stopPropagation();deleteItem(${item.id})">✕ Hapus</button>
            </div>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title">${item.title}</div>
          <div class="card-year">${item.year || '—'}</div>
          ${item.myRating ? `<div class="card-my-rating">${stars}</div>` : ''}
        </div>
      </div>`;
  }).join('');
}

// ========== MODAL UTILS ==========
function openModal(id) {
  document.getElementById(id).classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal(overlay.id);
  });
});

// ========== TOAST ==========
function showToast(msg, type = '') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `toast${type ? ' ' + type : ''}`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3200);
}

// ========== INIT ==========
updateStats();
renderList();
</script>
</body>
</html>
